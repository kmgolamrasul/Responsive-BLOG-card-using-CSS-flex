<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>

  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <img class="illustration" src="./assets/images/illustration-article.svg" alt="illustration">
      <div class="text">
        <div class="learning">Learning</div> 
    
        <p class="date">Published 21 Dec 2023</p>
    
        <a class="active" href="">HTML & CSS foundations</a>
    
        <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="greg">
        <img class="avatar" src="./assets/images/image-avatar.webp" alt="Greg">
        <h3>Greg Hooper</h3>
      </div>
      
    </div>

  </main>

  <footer class="attribution">
    Challenge by <a style="padding-left: 2.5px;" href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a style="padding-left: 2.5px;" href="#">Km Golam Rasul</a>.
  </footer>
</body>
</html>
